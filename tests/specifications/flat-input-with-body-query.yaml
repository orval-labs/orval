openapi: '3.0.0'
info:
  title: Flat Input Test - Query with Body
  version: 1.0.0
paths:
  /api/search/{orgId}:
    post:
      operationId: searchItems
      summary: Search items with path, query, and body
      parameters:
        - name: orgId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                filters:
                  type: object
                  properties:
                    status:
                      type: string
                    category:
                      type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
