openapi: 3.0.0
info:
  title: useDates + useExamples
  version: 1.0.0
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
              examples:
                default:
                  value:
                    - id: 1
                      createdAt: '2023-12-31T06:46:39.477Z'
                      birthDate: '2023-12-31'
  /pets/{id}:
    get:
      operationId: getPet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      required:
        - createdAt
        - birthDate
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
          example: '2023-12-31T06:46:39.477Z'
        birthDate:
          type: string
          format: date
          example: '2023-12-31'
