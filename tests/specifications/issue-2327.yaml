openapi: '3.0.0'
info:
  version: 1.0.0
  title: Issue 2327 — base mock handler content-type with mixed status codes
  license:
    name: MIT
servers:
  - url: http://petstore.swagger.io/v1
paths:
  /pets:
    get:
      operationId: listPets
      tags:
        - pets
      responses:
        '500':
          description: error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pets'
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    Pets:
      type: array
      items:
        $ref: '#/components/schemas/Pet'
    ProblemDetails:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        detail:
          type: string
