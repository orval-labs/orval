openapi: 3.0.3
info:
  title: array allOf items
  version: 1.0.0
paths:
  /options:
    get:
      operationId: getOptions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/UnionPartOne'
                    - $ref: '#/components/schemas/UnionPartTwo'
components:
  schemas:
    UnionPartOne:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
    UnionPartTwo:
      type: object
      required: [deletable]
      properties:
        deletable:
          type: boolean
