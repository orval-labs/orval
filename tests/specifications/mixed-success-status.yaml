openapi: '3.0.0'
info:
  version: 1.0.0
  title: Mixed Success Status API
  description: API with endpoints that return both 200 (JSON body) and 204 (No Content)
  license:
    name: MIT
paths:
  /resources:
    get:
      summary: List resources
      operationId: listResources
      responses:
        '200':
          description: A list of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /resources/{resourceId}:
    get:
      summary: Get a resource
      operationId: getResource
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: A single resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '204':
          description: No content
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a resource
      operationId: deleteResource
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted resource returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
        '204':
          description: Successfully deleted, no content returned
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Resource:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
