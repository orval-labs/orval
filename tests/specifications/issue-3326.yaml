openapi: 3.0.4
info:
  title: Issue 3326 - Angular object query parameter support
  version: 1.0.0
paths:
  /api/search:
    get:
      operationId: search
      tags:
        - search
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: filters
          in: query
          required: false
          schema:
            type: object
            additionalProperties:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
components:
  schemas:
    SearchResult:
      type: object
      properties:
        id:
          type: integer
          format: int32
