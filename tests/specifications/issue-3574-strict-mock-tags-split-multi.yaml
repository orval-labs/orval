openapi: 3.0.4
info:
  title: Issue 3574 - strict mock tags-split multi-schema
  version: '1.0.0'
paths:
  /pets:
    get:
      tags:
        - Store
      operationId: getPets
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /owner:
    get:
      tags:
        - Store
      operationId: getOwner
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      additionalProperties: false
    Owner:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          nullable: true
      additionalProperties: false
