openapi: 3.0.0
info:
  version: 1.0.0
  title: Issue 3590 - wide schema faker import aggregation
  license:
    name: MIT

# Regression for https://github.com/orval-labs/orval/issues/3590
# With `schemas: true` and strict mocks, a single object schema that delegates
# to many `$ref` component schemas must not duplicate the shared imports array
# (stack overflow) when building index.faker.ts.

