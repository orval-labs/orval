openapi: 3.1.0
info:
  title: Nullables
  description: 'Nullable types'
  version: 1.0.0
tags:
  - name: nullables
    description: Nullable types
servers:
  - url: http://localhost
paths:
  /nullable:
    get:
      tags:
        - nullables
      summary: Nullable response
      operationId: fetchNullable
      responses:
        200:
          description: Successful Operation
          content:
            application/json:
              schema:
                type:
                  - 'string'
                  - 'null'
  /nullable-object:
    get:
      tags:
        - nullables
      summary: Nullable object response
      operationId: fetchNullableObject
      responses:
        200:
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableObject'
  /nullable-with-multipart-form-data:
    post:
      tags:
        - nullables
      summary: Nullable with multipart/form-data request
      operationId: NullableWithMultipartFormRequest
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NullableObject'
      responses:
        200:
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableObject'
  /nullable-ref:
    get:
      tags:
        - nullables
      summary: 'Nullable $ref (type null + allOf) response'
      operationId: fetchNullableRef
      responses:
        200:
          description: Successful Operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableRefContainer'
components:
  schemas:
    NullableObject:
      type: object
      properties:
        name:
          type:
            - 'string'
            - 'null'
        age:
          anyOf:
            - type: 'integer'
            - type: 'null'
        address:
          oneOf:
            - type: 'string'
            - type: 'null'
        is_active:
          type:
            - 'boolean'
            - 'null'
    TimeIncrement:
      type: object
      properties:
        value:
          type: number
        unit:
          type: string
    NullableRefContainer:
      type: object
      properties:
        time_step:
          # Non-canonical nullable-$ref encoding emitted by some OAS 3.1
          # generators (e.g. Swashbuckle's UseAllOfToExtendReferenceSchemas;
          # passed through by @scalar/openapi-upgrader):
          # `{ type: 'null', allOf: [{ $ref }] }`. Orval should read the intent
          # and emit `TimeIncrement | null`, not collapse to `null`.
          type: 'null'
          allOf:
            - $ref: '#/components/schemas/TimeIncrement'
    NullStringEnum:
      type:
        - string
        - 'null'
      enum:
        - foo
        - bar
    NullEnum:
      nullable: true
      enum:
        - foo
        - null
    BlankEnum:
      enum:
        - ''
