openapi: 3.1.0
info:
  title: issue-3722
  description: |-
    Nullable allOf ref where a required key is missing from properties.
    Ghost keys must compile via Extract; nested required keys stay enforced.
  version: 1.0.0
servers:
  - url: http://petstore.swagger.io/v1
paths:
  /pets/{petId}/tag-info:
    get:
      summary: Get optional tag metadata for a pet
      operationId: getPetTagInfo
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pet tag info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetTagInfo'
components:
  schemas:
    TagMetadataItem:
      type: object
      required:
        - tagId
        - label
        - color
      properties:
        id:
          type: integer
        label:
          type: string
        color:
          type: string

    PetTagInfo:
      type: object
      required:
        - id
        - name
        - tagMetadata
      properties:
        id:
          type: integer
        name:
          type: string
        tagMetadata:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/TagMetadataItem'
