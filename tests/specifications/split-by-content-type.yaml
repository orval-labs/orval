openapi: '3.0.0'
info:
  version: 1.0.0
  title: Split By Content Type Test
  license:
    name: MIT
servers:
  - url: http://example.com/api/v1
paths:
  /profiles/{id}:
    put:
      summary: Update a profile
      operationId: updateProfile
      tags:
        - profiles
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileBody'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateProfileBody'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /avatars:
    post:
      summary: Upload an avatar
      operationId: uploadAvatar
      tags:
        - profiles
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AvatarUpload'
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Uploaded avatar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Avatar'
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /profiles:
    get:
      summary: List profiles
      operationId: listProfiles
      tags:
        - profiles
      responses:
        '200':
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profile'
components:
  schemas:
    Profile:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type: string
    UpdateProfileBody:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        email:
          type: string
          format: email
    AvatarUpload:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
        description:
          type: string
    Avatar:
      type: object
      required:
        - id
        - url
      properties:
        id:
          type: string
        url:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
