openapi: 3.0.0
info:
  title: Issue 3301 - keep unreferenced schemas under tag filter
  version: 1.0.0
paths:
  /pets:
    get:
      operationId: listPets
      tags:
        - pets
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /stream:
    get:
      operationId: streamEvents
      tags:
        - stream
      responses:
        '200':
          description: A stream chunk
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamChunk'
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    StreamChunk:
      type: object
      properties:
        data:
          type: string
    # Orphan schema: referenced by no path. Pruned by the #3254 tag filter
    # unless `includeUnreferencedSchemas` keeps it.
    UnusedModel:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
    # Orphan enum: also unreferenced.
    UnusedStatus:
      type: string
      enum:
        - active
        - archived
