openapi: 3.0.0
info:
  title: Issue 2540
  version: 1.0.0
paths:
  /users/{userId}:
    get:
      operationId: getUser
      summary: Get a user
      tags:
        - user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './common-schemas.yaml#/components/schemas/UserProfile'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: './common-schemas.yaml#/components/schemas/InternalServerError500'
