openapi: 3.0.3
info:
  title: Faker array item factories
  version: 1.0.0
paths:
  /tenants:
    get:
      operationId: getTenants
      tags:
        - tenants
      responses:
        '200':
          description: List tenants
          content:
            application/json:
              schema:
                type: object
                required:
                  - value
                  - count
                properties:
                  value:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                  count:
                    type: integer
  /tenants-by-ref:
    get:
      operationId: getTenantsByRef
      tags:
        - tenants
      responses:
        '200':
          description: List tenants by ref
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantListResponse'
components:
  schemas:
    TenantResponseModelDto:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    TenantListResponse:
      type: object
      required:
        - value
        - count
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/TenantResponseModelDto'
        count:
          type: integer
