openapi: 3.0.0
info:
  title: Issue 1522 - allParamsOptional with custom queryOptions mutator
  version: 1.0.0
paths:
  /house/{houseId}/cats:
    get:
      operationId: listHouseCats
      summary: List all cats of a house
      tags:
        - cats
      parameters:
        - name: houseId
          in: path
          required: true
          description: The id of the house to which the cats belong
          schema:
            type: integer
        - name: page
          in: query
          required: false
          description: Page number
          schema:
            type: integer
      responses:
        '200':
          description: A paged array of cats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cat'
components:
  schemas:
    Cat:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
