openapi: 3.0.0
info:
  version: 1.0.0
  title: Issue 3525 - strict mock multi-operation (OpenAPI 3.0)
  license:
    name: MIT

# Regression for duplicate strict-mock type declarations when several
# operations share one endpoints file (GET/POST Pet + GET Pet[]).

paths:
  /pet:
    get:
      operationId: getPet
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
    post:
      operationId: createPet
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'

components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date-time
          nullable: true
        photoUrls:
          type: array
          items:
            type: string
          nullable: true
