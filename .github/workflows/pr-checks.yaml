name: PR checks

on:
  pull_request:
    branches:
      - 'master'
      - 'next'

permissions:
  contents: read

jobs:
  pr-checks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Link workspace binaries
        if: runner.os != 'Windows'
        run: |
          find . -path '*/node_modules/orval' -type l | while read orval_link; do
            bin_dir="$(dirname "$orval_link")/.bin"
            mkdir -p "$bin_dir"
            ln -sf ../orval/dist/bin/orval.mjs "$bin_dir/orval"
          done

      - name: Check formatting
        run: bun run format:check

      - name: Build packages
        run: bun run build

      - name: Lint packages
        run: bun run lint

      - name: Test packages
        run: bun run test

      - name: Verify snapshot
        # this step also runs the generate-api task
        run: bun run test:snapshots

      - name: Verify generated code can build
        run: bun run --filter orval-tests build
