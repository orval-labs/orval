name: PR checks

on:
  pull_request:
    branches:
      - 'master'
      - 'next'

permissions:
  contents: read

jobs:
  pr-checks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v7
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Check formatting
        run: vp fmt --check

      - name: Build packages
        run: vp run -w build:release

      - name: Lint packages
        run: vp run -w lint

      - name: Lint samples
        run: vp run -w lint:samples

      - name: Typecheck packages
        run: vp run -w typecheck

      - name: Test packages
        run: vp run -w test

      - name: Verify snapshot
        # this step also runs the generate-api task
        run: vp run -w test:snapshots

      - name: Verify generated code can build
        run: vp run -F orval-tests build

  publish-preview:
    needs: pr-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build packages
        run: vp run -w build:release

      - name: Publish preview packages
        run: bun run pkg-pr-new publish './packages/*' --commentWithSha --packageManager=bun
